name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  server:
    name: Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p itonda-server --all-targets -- -D warnings

      - name: Test
        run: cargo test -p itonda-server

  cli:
    name: CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Clippy
        run: cargo clippy -p itonda-cli --all-targets -- -D warnings

      - name: Test
        run: cargo test -p itonda-cli

  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Typecheck
        working-directory: apps/web
        run: pnpm typecheck

      - name: Test
        working-directory: apps/web
        run: pnpm test

      - name: Build
        working-directory: apps/web
        run: pnpm build
